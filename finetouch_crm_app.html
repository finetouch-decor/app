<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fine Touch CRM">
<meta name="theme-color" content="#102A4B">
<title>Fine Touch CRM</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  :root {
    --navy:#102A4B; --gold:#C69E63; --gold2:#C7B090;
    --cream:#EAE6DA; --cream2:#F5F2EC; --white:#FFFFFF;
    --border:#D8D2C4; --text:#1a1a1a; --muted:#7a7060;
    --fechado:#2e6b3e; --perdido:#a03030;
    --shadow:0 2px 12px rgba(16,42,75,0.08);
    --safe-top: env(safe-area-inset-top);
    --safe-bottom: env(safe-area-inset-bottom);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body { background:var(--cream); color:var(--text); font-family:'Inter',sans-serif; font-size:14px; display:flex; flex-direction:column; }

  /* HEADER */
  header {
    background:var(--navy);
    padding: calc(var(--safe-top) + 12px) 20px 12px;
    display:flex; align-items:center; justify-content:space-between;
    flex-shrink:0; z-index:100;
    box-shadow:0 2px 16px rgba(16,42,75,0.25);
  }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon { width:34px; height:34px; flex-shrink:0; }
  .logo-text .fine { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:var(--cream); letter-spacing:1px; display:block; line-height:1; }
  .logo-text .touch { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:var(--gold); letter-spacing:1px; display:block; line-height:1; }
  .logo-text .sub { font-size:8px; color:var(--gold2); letter-spacing:1.5px; text-transform:uppercase; }

  .sync-status { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--gold2); }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--gold2); }
  .sync-dot.ok { background:#4ade80; }
  .sync-dot.syncing { background:var(--gold); animation:pulse 1s infinite; }
  .sync-dot.error { background:#f87171; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* STATS */
  .stats-bar { display:flex; background:var(--white); border-bottom:1px solid var(--border); overflow-x:auto; flex-shrink:0; scrollbar-width:none; }
  .stats-bar::-webkit-scrollbar { display:none; }
  .stat-item { flex:0 0 auto; min-width:100px; padding:10px 14px; border-right:1px solid var(--border); }
  .stat-label { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); font-weight:700; }
  .stat-value { font-family:'Inter',sans-serif; font-size:22px; font-weight:700; color:var(--navy); }

  /* TOOLBAR */
  .toolbar { background:var(--cream2); padding:10px 16px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--border); flex-shrink:0; overflow-x:auto; scrollbar-width:none; }
  .toolbar::-webkit-scrollbar { display:none; }
  .toolbar input, .toolbar select {
    background:var(--white); border:1px solid var(--border); color:var(--text);
    padding:8px 11px; border-radius:8px; font-family:'Inter',sans-serif; font-size:13px; outline:none;
    flex-shrink:0;
  }
  .toolbar input { min-width:160px; }
  .btn { padding:8px 14px; border-radius:8px; border:none; cursor:pointer; font-family:'Inter',sans-serif; font-size:13px; font-weight:600; transition:all .2s; white-space:nowrap; flex-shrink:0; }
  .btn-primary { background:var(--navy); color:var(--cream); }
  .btn-outline { background:transparent; color:var(--navy); border:1.5px solid var(--navy); }
  .btn-gold { background:var(--gold); color:var(--white); }
  .btn-sm { padding:5px 10px; font-size:12px; }
  .btn-danger { background:#a0303015; color:var(--perdido); border:1.5px solid #a0303040; }
  .ml-auto { margin-left:auto; }

  /* CONTENT AREA */
  .content { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; }

  /* LIST */
  .list-view { padding:16px; }
  .client-card {
    background:var(--white); border:1px solid var(--border); border-radius:12px;
    padding:16px; margin-bottom:10px; cursor:pointer;
    box-shadow:var(--shadow); transition:all .2s;
    display:flex; flex-direction:column; gap:8px;
  }
  .client-card:active { transform:scale(0.98); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; }
  .card-name { font-family:'Inter',sans-serif; font-size:18px; font-weight:700; color:var(--navy); }
  .card-tipo { font-size:11px; color:var(--muted); }
  .card-middle { display:flex; justify-content:space-between; align-items:center; }
  .card-valor { font-family:'Inter',sans-serif; font-size:17px; font-weight:700; color:var(--navy); }
  .card-local { font-size:12px; color:var(--muted); }
  .card-bottom { display:flex; justify-content:space-between; align-items:center; }
  .card-retorno { font-size:12px; }
  .card-interesse { font-size:12px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:200px; }

  .status-badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.8px; }
  .s-lead     { background:#102A4B18; color:var(--navy); border:1px solid #102A4B33; }
  .s-visita   { background:#C69E6318; color:#8a6520; border:1px solid #C69E6344; }
  .s-proposta { background:#7a6a4a18; color:#7a6a4a; border:1px solid #7a6a4a33; }
  .s-fechado  { background:#2e6b3e18; color:var(--fechado); border:1px solid #2e6b3e33; }
  .s-perdido  { background:#a0303018; color:var(--perdido); border:1px solid #a0303033; }

  .retorno-alert { color:var(--perdido); font-weight:700; }
  .retorno-hoje  { color:#8a6520; font-weight:700; }

  /* KANBAN */
  .kanban-view { display:flex; gap:12px; padding:16px; overflow-x:auto; height:100%; scrollbar-width:none; }
  .kanban-view::-webkit-scrollbar { display:none; }
  .kanban-col { min-width:200px; flex:0 0 200px; background:var(--white); border-radius:12px; padding:14px; border:1px solid var(--border); display:flex; flex-direction:column; max-height:100%; }
  .kanban-col-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; padding-bottom:10px; border-bottom:2px solid; flex-shrink:0; }
  .kanban-col-header h3 { font-family:'Inter',sans-serif; font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; }
  .kanban-count { border-radius:20px; padding:2px 7px; font-size:11px; font-weight:700; }
  .kanban-cards { overflow-y:auto; flex:1; scrollbar-width:none; }
  .kanban-cards::-webkit-scrollbar { display:none; }
  .col-lead .kanban-col-header { border-color:var(--navy); }
  .col-lead h3 { color:var(--navy); } .col-lead .kanban-count { background:#102A4B18; color:var(--navy); }
  .col-visita .kanban-col-header { border-color:var(--gold); }
  .col-visita h3 { color:#8a6520; } .col-visita .kanban-count { background:#C69E6318; color:#8a6520; }
  .col-proposta .kanban-col-header { border-color:#7a6a4a; }
  .col-proposta h3 { color:#7a6a4a; } .col-proposta .kanban-count { background:#7a6a4a18; color:#7a6a4a; }
  .col-fechado .kanban-col-header { border-color:#2e6b3e; }
  .col-fechado h3 { color:var(--fechado); } .col-fechado .kanban-count { background:#2e6b3e18; color:var(--fechado); }
  .col-perdido .kanban-col-header { border-color:#a03030; }
  .col-perdido h3 { color:var(--perdido); } .col-perdido .kanban-count { background:#a0303018; color:var(--perdido); }
  .kanban-card { background:var(--cream2); border:1px solid var(--border); border-radius:9px; padding:12px; margin-bottom:8px; cursor:pointer; }
  .kanban-card:active { opacity:.8; }
  .kanban-card h4 { font-size:13px; font-weight:600; color:var(--navy); margin-bottom:3px; }
  .kanban-card .meta { font-size:11px; color:var(--muted); }
  .kanban-card .valor { font-family:'Inter',sans-serif; font-size:14px; color:var(--navy); font-weight:700; margin-top:5px; }

  /* RETORNOS */
  .cal-view { padding:16px; }
  .cal-item { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:14px; display:flex; align-items:center; gap:14px; cursor:pointer; margin-bottom:10px; box-shadow:var(--shadow); }
  .cal-item:active { opacity:.8; }
  .cal-date { background:var(--cream); border:1.5px solid var(--border); border-radius:8px; width:50px; height:50px; display:flex; flex-direction:column; align-items:center; justify-content:center; flex-shrink:0; }
  .cal-date .day { font-family:'Inter',sans-serif; font-weight:800; font-size:20px; line-height:1; color:var(--navy); }
  .cal-date .mon { font-size:9px; text-transform:uppercase; color:var(--muted); letter-spacing:.5px; }
  .cal-info h4 { font-weight:600; color:var(--navy); margin-bottom:2px; font-size:15px; }
  .cal-info .sub { font-size:11px; color:var(--muted); }
  .cal-past .cal-date { border-color:var(--perdido); }
  .cal-past .cal-date .day { color:var(--perdido); }
  .cal-today .cal-date { border-color:var(--gold); background:#C69E6312; }
  .cal-today .cal-date .day { color:#8a6520; }

  /* BOTTOM NAV */
  .bottom-nav {
    background:var(--white); border-top:1px solid var(--border);
    display:flex; padding-bottom:calc(var(--safe-bottom) + 4px);
    flex-shrink:0; z-index:100;
  }
  .nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; padding:10px 4px 6px; border:none; background:none; cursor:pointer; color:var(--muted); font-family:'Inter',sans-serif; font-size:10px; font-weight:600; letter-spacing:.3px; gap:4px; transition:color .2s; }
  .nav-btn.active { color:var(--navy); }
  .nav-btn .icon { font-size:20px; }

  /* FAB */
  .fab {
    position:fixed; right:20px; bottom:calc(var(--safe-bottom) + 72px);
    width:54px; height:54px; background:var(--navy); border-radius:50%; border:none;
    color:var(--cream); font-size:26px; cursor:pointer;
    box-shadow:0 4px 20px rgba(16,42,75,0.35); z-index:90;
    display:flex; align-items:center; justify-content:center;
    transition:transform .2s;
  }
  .fab:active { transform:scale(0.93); }

  /* MODAL */
  .overlay { display:none; position:fixed; inset:0; background:rgba(16,42,75,0.5); z-index:200; align-items:flex-end; justify-content:center; }
  .overlay.open { display:flex; }
  .modal {
    background:var(--cream2); border-radius:20px 20px 0 0;
    padding:24px 20px calc(var(--safe-bottom) + 24px);
    width:100%; max-height:92vh; overflow-y:auto; position:relative;
    box-shadow:0 -8px 40px rgba(16,42,75,0.18);
    animation:slideUp .3s ease;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:40px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 20px; }
  .modal-header { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .modal-header h2 { font-family:'Inter',sans-serif; font-size:22px; font-weight:700; color:var(--navy); }
  .modal-header h2 span { color:var(--gold); }
  .close-btn { margin-left:auto; background:var(--cream); border:1px solid var(--border); color:var(--muted); width:30px; height:30px; border-radius:50%; cursor:pointer; font-size:14px; }
  .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:13px; }
  .form-full { grid-column:1/-1; }
  .field label { display:block; font-size:10px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:5px; font-weight:700; }
  .field input, .field select, .field textarea {
    width:100%; background:var(--white); border:1.5px solid var(--border); color:var(--text);
    padding:11px 12px; border-radius:8px; font-family:'Inter',sans-serif; font-size:15px; outline:none;
    -webkit-appearance:none; appearance:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color:var(--gold); }
  .field textarea { resize:none; height:80px; }
  .modal-actions { display:flex; gap:10px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }
  .modal-actions .btn { flex:1; padding:13px; font-size:15px; border-radius:10px; }

  /* LOADING */
  .loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:12px; color:var(--muted); }
  .spinner { width:32px; height:32px; border:3px solid var(--border); border-top-color:var(--navy); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .empty { text-align:center; color:var(--muted); padding:48px 20px; }
  .empty-icon { font-size:36px; margin-bottom:8px; }

  /* TOAST */
  .toast { position:fixed; top:calc(var(--safe-top) + 80px); left:50%; transform:translateX(-50%) translateY(-10px); background:var(--navy); color:var(--cream); padding:10px 20px; border-radius:30px; font-size:13px; font-weight:600; z-index:400; opacity:0; transition:all .3s; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.success { background:#2e6b3e; }
  .toast.error { background:var(--perdido); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 38 38" fill="none">
      <circle cx="19" cy="19" r="19" fill="#EAE6DA"/>
      <rect x="5" y="5" width="13" height="2.5" fill="#102A4B"/>
      <rect x="5" y="5" width="2.5" height="13" fill="#102A4B"/>
      <rect x="5" y="11" width="8" height="2" fill="#102A4B"/>
      <rect x="13" y="21" width="13" height="2.5" fill="#C69E63"/>
      <rect x="18" y="21" width="2.5" height="12" fill="#C69E63"/>
      <line x1="19" y1="5" x2="19" y2="33" stroke="#EAE6DA" stroke-width="1.4"/>
      <line x1="5" y1="19" x2="33" y2="19" stroke="#EAE6DA" stroke-width="1.4"/>
    </svg>
    <div class="logo-text">
      <span class="fine">FINE</span>
      <span class="touch">TOUCH</span>
      <span class="sub">CRM</span>
    </div>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-label">Conectando...</span>
  </div>
</header>

<!-- STATS -->
<div class="stats-bar" id="stats-bar"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input type="search" id="search" placeholder="🔍 Buscar..." oninput="render()">
  <select id="filterStatus" onchange="render()">
    <option value="">Todos</option>
    <option value="lead">Lead</option>
    <option value="visita">Visita</option>
    <option value="proposta">Proposta</option>
    <option value="fechado">Fechado</option>
    <option value="perdido">Perdido</option>
  </select>
</div>

<!-- CONTENT -->
<div class="content" id="content">
  <div id="view-lista" class="list-view">
    <div class="loading"><div class="spinner"></div><span>Carregando...</span></div>
  </div>
  <div id="view-kanban" class="kanban-view" style="display:none">
    <div class="kanban-col col-lead"><div class="kanban-col-header"><h3>Lead</h3><span class="kanban-count" id="kc-lead">0</span></div><div class="kanban-cards" id="kl-lead"></div></div>
    <div class="kanban-col col-visita"><div class="kanban-col-header"><h3>Visita</h3><span class="kanban-count" id="kc-visita">0</span></div><div class="kanban-cards" id="kl-visita"></div></div>
    <div class="kanban-col col-proposta"><div class="kanban-col-header"><h3>Proposta</h3><span class="kanban-count" id="kc-proposta">0</span></div><div class="kanban-cards" id="kl-proposta"></div></div>
    <div class="kanban-col col-fechado"><div class="kanban-col-header"><h3>Fechado</h3><span class="kanban-count" id="kc-fechado">0</span></div><div class="kanban-cards" id="kl-fechado"></div></div>
    <div class="kanban-col col-perdido"><div class="kanban-col-header"><h3>Perdido</h3><span class="kanban-count" id="kc-perdido">0</span></div><div class="kanban-cards" id="kl-perdido"></div></div>
  </div>
  <div id="view-retornos" class="cal-view" style="display:none"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-lista" onclick="setView('lista')"><span class="icon">☰</span>Lista</button>
  <button class="nav-btn" id="nav-kanban" onclick="setView('kanban')"><span class="icon">⊞</span>Kanban</button>
  <button class="nav-btn" id="nav-retornos" onclick="setView('retornos')"><span class="icon">📅</span>Retornos</button>
  <button class="nav-btn" onclick="exportCSV()"><span class="icon">↓</span>Exportar</button>
</nav>

<!-- FAB -->
<button class="fab" onclick="openModal()" title="Novo cliente">+</button>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeIfOutside(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <h2 id="modal-title">Novo <span>Cliente</span></h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-grid">
      <div class="field form-full"><label>Nome Completo</label><input id="f-nome" placeholder="Nome do cliente" autocomplete="name"></div>
      <div class="field"><label>Telefone / WhatsApp</label><input id="f-tel" placeholder="+1 (000) 000-0000" type="tel"></div>
      <div class="field"><label>Local / Cidade</label><input id="f-local" placeholder="Miami, FL"></div>
      <div class="field"><label>Tipo de Projeto</label>
        <select id="f-tipo">
          <option>Reforma</option><option>Construção</option><option>Acabamento</option>
          <option>Ampliação</option><option>Decoração</option><option>Design de Interiores</option><option>Outro</option>
        </select>
      </div>
      <div class="field"><label>Status</label>
        <select id="f-status">
          <option value="lead">Lead</option><option value="visita">Visita</option>
          <option value="proposta">Proposta</option><option value="fechado">Fechado</option><option value="perdido">Perdido</option>
        </select>
      </div>
      <div class="field form-full"><label>Interesse / Escopo</label><input id="f-interesse" placeholder="O que o cliente deseja..."></div>
      <div class="field"><label>Valor Estimado (US$)</label><input id="f-valor" type="number" placeholder="0" step="100" inputmode="numeric"></div>
      <div class="field"><label>1º Contato</label><input id="f-dtcontato" type="date"></div>
      <div class="field form-full"><label>Data de Retorno</label><input id="f-retorno" type="date"></div>
      <div class="field form-full"><label>Observações</label><textarea id="f-obs" placeholder="Notas sobre o cliente e projeto..."></textarea></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="btn-delete" onclick="deleteClient()" style="display:none;flex:0.6">Excluir</button>
      <button class="btn btn-primary" onclick="saveClient()">Salvar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── SUPABASE ────────────────────────────────────────────────
const SUPABASE_URL = 'https://jpbpzlpvhdwgbmljqfyd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_l6x3A2YiBL0Pc7huB-QejA_d2RXKL59';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ─── STATE ───────────────────────────────────────────────────
let records = []; // combined lead+client records
let editId = null, editClientId = null, currentView = 'lista';

// ─── SYNC UI ─────────────────────────────────────────────────
function updateSyncUI(state) {
  const dot = document.getElementById('sync-dot');
  const label = document.getElementById('sync-label');
  dot.className = 'sync-dot';
  if (state === 'syncing') { dot.classList.add('syncing'); label.textContent = 'Salvando...'; }
  else if (state === 'ok')  { dot.classList.add('ok');      label.textContent = 'Conectado'; }
  else if (state === 'error') { dot.classList.add('error'); label.textContent = 'Erro'; }
}

// ─── LOAD DATA ───────────────────────────────────────────────
async function loadData() {
  updateSyncUI('syncing');
  const { data, error } = await db
    .from('leads')
    .select(`
      id,
      status,
      project_type,
      scope,
      estimated_value,
      first_contact_date,
      follow_up_date,
      notes,
      clients ( id, name, phone, city )
    `)
    .order('created_at', { ascending: false });

  if (error) {
    updateSyncUI('error');
    showToast('Erro ao carregar dados', 'error');
    console.error(error);
    return;
  }

  records = (data || []).map(l => ({
    id: l.id,
    client_id: l.clients?.id,
    nome: l.clients?.name || '',
    tel: l.clients?.phone || '',
    local: l.clients?.city || '',
    tipo: l.project_type || '',
    interesse: l.scope || '',
    valor: l.estimated_value || '',
    status: l.status || 'lead',
    dtcontato: l.first_contact_date || '',
    retorno: l.follow_up_date || '',
    obs: l.notes || ''
  }));

  updateSyncUI('ok');
  render();
}

// ─── UTILS ───────────────────────────────────────────────────
function fmtValor(v) { if(!v&&v!==0)return'—'; return '$'+Number(v).toLocaleString('en-US',{minimumFractionDigits:0}); }
function fmtDate(d) { if(!d)return'—'; const[y,m,dia]=d.split('-'); return`${dia}/${m}/${y}`; }
function today() { return new Date().toISOString().slice(0,10); }
function retornoClass(d) { if(!d)return''; const t=today(); if(d<t)return'retorno-alert'; if(d===t)return'retorno-hoje'; return''; }
function retornoLabel(d) { if(!d)return'—'; const t=today(); if(d<t)return'⚠ '+fmtDate(d); if(d===t)return'● Hoje'; return fmtDate(d); }

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  setTimeout(() => t.className='toast', 2800);
}

function filtered() {
  const s = document.getElementById('search').value.toLowerCase();
  const fs = document.getElementById('filterStatus').value;
  return records.filter(c =>
    (!s || c.nome.toLowerCase().includes(s) || (c.local||'').toLowerCase().includes(s)) &&
    (!fs || c.status === fs)
  );
}

// ─── RENDER ──────────────────────────────────────────────────
function render() {
  renderStats();
  if (currentView==='lista') renderLista();
  else if (currentView==='kanban') renderKanban();
  else renderRetornos();
}

function renderStats() {
  const t = today();
  const total = records.length;
  const ativos = records.filter(c=>c.status!=='perdido'&&c.status!=='fechado').length;
  const alerts = records.filter(c=>c.retorno&&c.retorno<=t&&c.status!=='fechado'&&c.status!=='perdido').length;
  const pipeline = records.filter(c=>c.status!=='perdido').reduce((s,c)=>s+(Number(c.valor)||0),0);
  const fechados = records.filter(c=>c.status==='fechado').length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-item"><div class="stat-label">Clientes</div><div class="stat-value">${total}</div></div>
    <div class="stat-item"><div class="stat-label">Ativos</div><div class="stat-value">${ativos}</div></div>
    <div class="stat-item"><div class="stat-label">Fechados</div><div class="stat-value">${fechados}</div></div>
    <div class="stat-item"><div class="stat-label">Pipeline</div><div class="stat-value" style="font-size:16px">${fmtValor(pipeline)}</div></div>
    <div class="stat-item"><div class="stat-label">Follow-ups</div><div class="stat-value" style="${alerts>0?'color:var(--perdido)':''}">${alerts}</div></div>
  `;
}

function renderLista() {
  const data = filtered();
  const el = document.getElementById('view-lista');
  if (!data.length) { el.innerHTML='<div class="empty"><div class="empty-icon">✦</div>Nenhum cliente encontrado.</div>'; return; }
  el.innerHTML = data.map(c => `
    <div class="client-card" onclick="openModal('${c.id}')">
      <div class="card-top">
        <div><div class="card-name">${c.nome}</div><div class="card-tipo">${c.tipo||''} ${c.local?'· '+c.local:''}</div></div>
        <span class="status-badge s-${c.status}">${c.status}</span>
      </div>
      <div class="card-middle">
        <div class="card-valor">${fmtValor(c.valor)}</div>
        <div class="card-local">${fmtDate(c.dtcontato)}</div>
      </div>
      <div class="card-bottom">
        <div class="card-interesse">${c.interesse||'—'}</div>
        <div class="card-retorno ${retornoClass(c.retorno)}">${retornoLabel(c.retorno)}</div>
      </div>
    </div>
  `).join('');
}

function renderKanban() {
  ['lead','visita','proposta','fechado','perdido'].forEach(s => {
    const list = filtered().filter(c=>c.status===s);
    const kc = document.getElementById('kc-'+s);
    if(kc) kc.textContent=list.length;
    const kl = document.getElementById('kl-'+s);
    if(!kl) return;
    kl.innerHTML = list.length ? list.map(c=>`
      <div class="kanban-card" onclick="openModal('${c.id}')">
        <h4>${c.nome}</h4>
        <div class="meta">${c.tipo||''} ${c.local?'· '+c.local:''}</div>
        ${c.valor?`<div class="valor">${fmtValor(c.valor)}</div>`:''}
        ${c.retorno?`<div style="font-size:11px;margin-top:4px" class="${retornoClass(c.retorno)}">${retornoLabel(c.retorno)}</div>`:''}
      </div>`).join('')
    :'<div style="color:var(--muted);font-size:12px;text-align:center;padding:16px;border:1.5px dashed var(--border);border-radius:8px">Vazio</div>';
  });
}

function renderRetornos() {
  const t = today();
  const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const sorted = [...records].filter(c=>c.retorno).sort((a,b)=>a.retorno.localeCompare(b.retorno));
  const el = document.getElementById('view-retornos');
  if (!sorted.length) { el.innerHTML='<div class="empty"><div class="empty-icon">📅</div>Nenhum retorno agendado.</div>'; return; }
  el.innerHTML = sorted.map(c=>{
    const[y,m,d]=c.retorno.split('-');
    const cls=c.retorno<t?'cal-past':c.retorno===t?'cal-today':'';
    return`<div class="cal-item ${cls}" onclick="openModal('${c.id}')">
      <div class="cal-date"><div class="day">${d}</div><div class="mon">${meses[parseInt(m)-1]}</div></div>
      <div class="cal-info" style="flex:1">
        <h4>${c.nome}</h4>
        <div class="sub">${c.tipo||''} ${c.local?'· '+c.local:''}</div>
        ${c.interesse?`<div class="sub">${c.interesse}</div>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <span class="status-badge s-${c.status}">${c.status}</span>
        ${c.valor?`<div style="font-family:'Inter',sans-serif;font-size:15px;font-weight:700;color:var(--navy);margin-top:4px">${fmtValor(c.valor)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

// ─── VIEW ────────────────────────────────────────────────────
function setView(v) {
  currentView=v;
  ['lista','kanban','retornos'].forEach(x=>{
    document.getElementById('view-'+x).style.display=x===v?(v==='kanban'?'flex':'block'):'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',['lista','kanban','retornos'][i]===v));
  render();
}

// ─── MODAL ───────────────────────────────────────────────────
function openModal(id) {
  editId = id || null;
  const c = id ? records.find(x => x.id === id) : null;
  editClientId = c?.client_id || null;
  document.getElementById('modal-title').innerHTML = c ? 'Editar <span>Cliente</span>' : 'Novo <span>Cliente</span>';
  document.getElementById('f-nome').value = c?.nome || '';
  document.getElementById('f-tel').value = c?.tel || '';
  document.getElementById('f-local').value = c?.local || '';
  document.getElementById('f-tipo').value = c?.tipo || 'Reforma';
  document.getElementById('f-interesse').value = c?.interesse || '';
  document.getElementById('f-valor').value = c?.valor || '';
  document.getElementById('f-status').value = c?.status || 'lead';
  document.getElementById('f-dtcontato').value = c?.dtcontato || today();
  document.getElementById('f-retorno').value = c?.retorno || '';
  document.getElementById('f-obs').value = c?.obs || '';
  document.getElementById('btn-delete').style.display = c ? 'flex' : 'none';
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); editId = null; editClientId = null; }
function closeIfOutside(e) { if(e.target.id==='overlay') closeModal(); }

// ─── SAVE ────────────────────────────────────────────────────
async function saveClient() {
  const nome = document.getElementById('f-nome').value.trim();
  if (!nome) { showToast('Informe o nome do cliente.', 'error'); return; }

  const clientData = {
    name: nome,
    phone: document.getElementById('f-tel').value.trim(),
    city: document.getElementById('f-local').value.trim(),
    type: 'person'
  };

  const leadData = {
    project_type: document.getElementById('f-tipo').value,
    scope: document.getElementById('f-interesse').value.trim(),
    estimated_value: document.getElementById('f-valor').value || null,
    status: document.getElementById('f-status').value,
    first_contact_date: document.getElementById('f-dtcontato').value || null,
    follow_up_date: document.getElementById('f-retorno').value || null,
    notes: document.getElementById('f-obs').value.trim()
  };

  updateSyncUI('syncing');

  try {
    if (editId && editClientId) {
      // UPDATE
      const { error: ce } = await db.from('clients').update(clientData).eq('id', editClientId);
      const { error: le } = await db.from('leads').update(leadData).eq('id', editId);
      if (ce || le) throw ce || le;
      showToast('Cliente atualizado!', 'success');
    } else {
      // INSERT client
      const { data: newClient, error: ce } = await db.from('clients').insert(clientData).select().single();
      if (ce) throw ce;
      // INSERT lead
      leadData.client_id = newClient.id;
      const { error: le } = await db.from('leads').insert(leadData);
      if (le) throw le;
      showToast('Cliente criado!', 'success');
    }
    updateSyncUI('ok');
    closeModal();
    await loadData();
  } catch(err) {
    console.error(err);
    updateSyncUI('error');
    showToast('Erro ao salvar. Tente novamente.', 'error');
  }
}

// ─── DELETE ──────────────────────────────────────────────────
async function deleteClient() {
  if (!confirm('Excluir este cliente?')) return;
  updateSyncUI('syncing');
  try {
    await db.from('leads').delete().eq('id', editId);
    if (editClientId) await db.from('clients').delete().eq('id', editClientId);
    updateSyncUI('ok');
    closeModal();
    showToast('Cliente excluído.', '');
    await loadData();
  } catch(err) {
    updateSyncUI('error');
    showToast('Erro ao excluir.', 'error');
  }
}

// ─── EXPORT ──────────────────────────────────────────────────
function exportCSV() {
  const header = ['Nome','Telefone','Local','Tipo','Interesse','Valor (USD)','Status','1º Contato','Retorno','Observações'];
  const rows = records.map(c=>[c.nome,c.tel,c.local,c.tipo,c.interesse,c.valor?'$'+Number(c.valor).toLocaleString('en-US'):'',c.status,fmtDate(c.dtcontato),fmtDate(c.retorno),c.obs]);
  const csv = [header,...rows].map(r=>r.map(v=>`"${(v||'').replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='finetouch_clientes.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('Exportado com sucesso!', 'success');
}

// ─── INIT ────────────────────────────────────────────────────
loadData();
</script>
