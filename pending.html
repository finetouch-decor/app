<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine Touch — Aguardando Aprovação</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  :root { --navy:#102A4B; --gold:#C69E63; --cream2:#F5F2EC; --muted:#7a7060; --border:#D8D2C4; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Inter',sans-serif; background:var(--navy); min-height:100vh;
    display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { background:var(--cream2); border-radius:20px; padding:48px 36px; width:100%;
    max-width:420px; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,0.3); }
  .icon { font-size:52px; margin-bottom:20px; }
  h2 { font-size:22px; font-weight:800; color:var(--navy); margin-bottom:10px; }
  p { font-size:14px; color:var(--muted); line-height:1.6; margin-bottom:8px; }
  .email-badge { background:rgba(16,42,75,0.08); border:1px solid rgba(16,42,75,0.15);
    border-radius:8px; padding:8px 14px; display:inline-block; font-size:13px;
    font-weight:600; color:var(--navy); margin:14px 0 24px; }
  .btn-logout { padding:12px 28px; border-radius:10px; border:1.5px solid var(--border);
    background:transparent; color:var(--muted); font-family:'Inter',sans-serif;
    font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-logout:hover { border-color:var(--navy); color:var(--navy); }
  .status-rejected { color:#a03030; }
  .status-rejected h2 { color:#a03030; }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%;
    background:var(--gold); margin-right:6px; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.3)} }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon" id="icon">⏳</div>
  <h2 id="title">Aguardando aprovação</h2>
  <p id="msg1">Sua conta foi criada com sucesso.</p>
  <p id="msg2">O administrador precisa aprovar seu acesso antes de entrar no sistema.</p>
  <div class="email-badge" id="user-email">...</div>
  <br>
  <p style="font-size:12px;color:var(--muted)"><span class="dot"></span>Você será notificado assim que for aprovado.</p>
  <br><br>
  <button class="btn-logout" onclick="logout()">Sair da conta</button>
</div>

<script>
const SUPABASE_URL = 'https://jpbpzlpvhdwgbmljqfyd.supabase.co';
const SUPABASE_KEY = 'sb_publishable_l6x3A2YiBL0Pc7huB-QejA_d2RXKL59';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  const { data: { session } } = await db.auth.getSession();
  if (!session) { window.location.href = '/login.html'; return; }

  document.getElementById('user-email').textContent = session.user.email;

  // Checar status
  const { data: profile } = await db.from('user_profiles').select('status').eq('id', session.user.id).single();
  if (!profile) return;

  if (profile.status === 'approved') {
    window.location.href = '/dashboard'; return;
  }
  if (profile.status === 'rejected') {
    document.getElementById('card').classList.add('status-rejected');
    document.getElementById('icon').textContent = '🚫';
    document.getElementById('title').textContent = 'Acesso negado';
    document.getElementById('msg1').textContent = 'Sua solicitação de acesso foi negada.';
    document.getElementById('msg2').textContent = 'Entre em contato com o administrador para mais informações.';
    document.querySelector('.dot').style.display = 'none';
  }

  // Polling a cada 15s para checar se foi aprovado
  setTimeout(init, 15000);
}

async function logout() {
  await db.auth.signOut();
  window.location.href = '/login.html';
}

init();
</script>
</body>
</html>
